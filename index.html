<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stone Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Welcome to Stone Paper Scissors</h1>

      <div class="image">
        <img id="player-choice" src="./hand-paper.png" alt="Player's choice" />
        <img
          id="computer-choice"
          src="./hand-paper.png"
          alt="Computer's choice"
        />
      </div>

      <div class="scores">
        <p>Player: 0</p>
        <p>Computer: 0</p>
      </div>

      <p id="choose">Choose your option:</p>

      <div class="result">
        <h2 id="result-text"></h2>
      </div>

      <div class="buttons">
        <button id="stone">Stone</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>
      </div>

      <button id="play">Play</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
